services:
  postgres:
    image: postgres:16-alpine
    container_name: axon_postgres
    environment:
      POSTGRES_USER: axon_user
      POSTGRES_PASSWORD: axon_pass
      POSTGRES_DB: axon_db
    ports:
      - "5432:5432"
    volumes:
      - axon_postgres_data:/var/lib/postgresql/data
  
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: axon_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@axon.com
      PGADMIN_DEFAULT_PASSWORD: admin_pass
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  axon_postgres_data: