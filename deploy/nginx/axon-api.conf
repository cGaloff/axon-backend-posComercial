# Reverse proxy para la API AXON.
# Copiar a /etc/nginx/sites-available/axon-api en el VPS y reemplazar api.tudominio.com.
# Certbot añadirá automáticamente el bloque TLS (listen 443) y el redirect 80 -> 443.

server {
    listen 80;
    server_name api.tudominio.com;

    # Margen para recibos PDF / cargas
    client_max_body_size 20m;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        keep-alive;

        proxy_read_timeout 120s;
    }
}
